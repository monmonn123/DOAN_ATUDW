## =====================================================================
## ======================= SERVER & SSL CONFIG =========================
## =====================================================================
server.port=8443
spring.application.name=edumoet

# Cấu hình SSL (HTTPS) - Giữ nguyên đường dẫn bạn đã cung cấp
server.ssl.key-store=file:C:/Users/Admin/Desktop/localhost.p12
server.ssl.key-store-password=changeit
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=localhost

## =====================================================================
## ==================== DATABASE CONFIG (H2 RAM) =======================
## =====================================================================
# Sử dụng H2 giả lập SQL Server để làm Lab cho nhẹ
spring.datasource.url=jdbc:h2:mem:LTW;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=Ichigo123
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (Chỉ cho phép truy cập nội bộ để fix lộ DB)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

## =====================================================================
## ===================== SESSION SECURITY (FIX) ========================
## =====================================================================
# FIX: Dùng COOKIE thay vì URL rewrite để tránh lộ JSESSIONID trên URL
server.servlet.session.tracking-modes=cookie
server.servlet.session.timeout=30m

# FIX SESSION HIJACKING: Các cờ bảo mật cho Cookie
server.servlet.session.cookie.http-only=true
# Để true nếu bạn chạy HTTPS hoàn toàn, false nếu vẫn muốn test HTTP
server.servlet.session.cookie.secure=true 
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.name=EDUMOETSESSION
server.servlet.session.cookie.path=/
server.servlet.session.cookie.max-age=1800

# FIX CLICKJACKING: Header CSP chặn nhúng iframe từ domain lạ
# (Chỉ cho phép 'self' - chính trang web này được nhúng chính nó)
server.servlet.context-parameters.Content-Security-Policy=frame-ancestors 'self';

## =====================================================================
## ===================== OTHER CONFIGURATIONS ==========================
## =====================================================================

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Encoding / i18n
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.messages.encoding=UTF-8

# JWT (Giữ nguyên Secret của bạn)
#jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# WebSocket
spring.websocket.path=/ws
spring.websocket.max-text-message-size=8192
spring.websocket.max-binary-message-size=10485760

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Chatbot OpenAI
chatbot.openai.enabled=true
chatbot.openai.api-key=${OPENAI_API_KEY:}
chatbot.openai.model=gpt-4o-mini
chatbot.openai.max-tokens=500
chatbot.openai.temperature=0.7
chatbot.name=EDUMOET Bot

# AWS S3
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:}
cloud.aws.region.static=ap-southeast-1
cloud.aws.s3.bucket=tungbacket
cloud.aws.s3.base-folder=uploads
# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.edumoet=DEBUG